<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Hip Recovery">
  <meta name="theme-color" content="#f8f7f4">
  <meta name="description" content="Gym tracker for hip arthroscopy recovery">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <title>Hip Recovery Tracker</title>
</head>
<body>
  <div id="app"></div>

  <!-- Home Template -->
  <template id="tpl-home">
    <header class="app-header">
      <h1>Hip Recovery</h1>
      <p class="subtitle">Garrett Brusewitz</p>
    </header>

    <main class="home">
      <div class="active-session-banner" data-active hidden>
        <div>
          <div class="banner-label">Session in progress</div>
          <div class="banner-date" data-active-date></div>
        </div>
        <button class="btn-text" data-resume>Resume →</button>
      </div>

      <button class="btn-primary" data-new-session>
        <span class="btn-icon">+</span>
        Start new session
      </button>

      <button class="btn-secondary" data-history>
        View history
      </button>

      <button class="btn-secondary" data-print>
        Print this week for PT
      </button>

      <button class="btn-secondary" data-export>
        Export data
      </button>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-nav="home">
        <span class="nav-icon">⌂</span>
        <span>Home</span>
      </button>
      <button class="nav-item" data-nav="history">
        <span class="nav-icon">☰</span>
        <span>History</span>
      </button>
    </nav>
  </template>

  <!-- New Session Template -->
  <template id="tpl-new-session">
    <header class="app-header with-back">
      <button class="btn-back" data-back>← Back</button>
      <h2>New session</h2>
    </header>

    <main class="form">
      <section class="card">
        <label class="field">
          <span class="field-label">Date</span>
          <input type="date" data-field="date" required>
        </label>
      </section>

      <section class="card">
        <h3>Before gym</h3>
        <div class="pain-picker" data-pain-picker="pre"></div>
        <label class="field">
          <span class="field-label">Notes</span>
          <textarea data-field="preNotes" rows="2" placeholder="How does it feel walking in?"></textarea>
        </label>
      </section>

      <section class="card">
        <div class="card-header">
          <h3>Exercises</h3>
          <button class="btn-add" data-add-exercise>+ Add</button>
        </div>
        <div class="exercise-list" data-exercise-list></div>
      </section>

      <button class="btn-primary" data-save-session>Save & continue</button>
    </main>
  </template>

  <!-- Session Detail Template -->
  <template id="tpl-session-detail">
    <header class="app-header with-back">
      <button class="btn-back" data-back>← Back</button>
      <h2 data-session-date></h2>
    </header>

    <main class="form">
      <section class="card">
        <h3>Before gym</h3>
        <div class="pain-display" data-pain-display="pre"></div>
        <p class="notes-display" data-notes-display="pre"></p>
      </section>

      <section class="card">
        <h3>Exercises</h3>
        <div class="exercise-display" data-exercise-display></div>
      </section>

      <section class="card checkpoint-card">
        <div class="card-header">
          <h3>Right after gym</h3>
          <span class="checkpoint-time" data-checkpoint-time="post"></span>
        </div>
        <div class="checkpoint" data-checkpoint="post"></div>
      </section>

      <section class="card checkpoint-card">
        <div class="card-header">
          <h3>2 hours later</h3>
          <span class="checkpoint-time" data-checkpoint-time="twoHour"></span>
        </div>
        <div class="checkpoint" data-checkpoint="twoHour"></div>
      </section>

      <section class="card checkpoint-card">
        <div class="card-header">
          <h3>That night</h3>
          <span class="checkpoint-time" data-checkpoint-time="night"></span>
        </div>
        <div class="checkpoint" data-checkpoint="night"></div>
      </section>

      <button class="btn-danger" data-delete-session>Delete session</button>
    </main>
  </template>

  <!-- History Template -->
  <template id="tpl-history">
    <header class="app-header">
      <h1>History</h1>
    </header>

    <main class="history">
      <div class="chart-container" data-chart hidden>
        <h3>Pain trend</h3>
        <div class="chart" data-chart-svg></div>
        <div class="chart-legend">
          <span><i class="dot-legend" style="background:#5e8a72"></i>Before</span>
          <span><i class="dot-legend" style="background:#c4904d"></i>After</span>
          <span><i class="dot-legend" style="background:#9e6d8e"></i>Night</span>
        </div>
      </div>

      <div class="session-list" data-session-list></div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item" data-nav="home">
        <span class="nav-icon">⌂</span>
        <span>Home</span>
      </button>
      <button class="nav-item active" data-nav="history">
        <span class="nav-icon">☰</span>
        <span>History</span>
      </button>
    </nav>
  </template>

  <!-- Print/PDF Template -->
  <template id="tpl-print">
    <header class="app-header with-back no-print">
      <button class="btn-back" data-back>← Back</button>
      <h2>Print for PT</h2>
    </header>

    <main class="print-main no-print-padding">
      <div class="no-print print-controls">
        <button class="btn-primary" onclick="window.print()">Print</button>
        <button class="btn-secondary" data-export-pdf>Export PDF</button>
      </div>

      <article class="print-sheet">
        <header class="print-header">
          <h1>Hip Arthroscopy Recovery — Gym Log</h1>
          <div class="print-meta">
            <div><strong>Patient:</strong> Garrett Brusewitz</div>
            <div><strong>Week of:</strong> <span data-week-range></span></div>
          </div>
        </header>

        <div data-print-body></div>

        <footer class="print-footer">
          Pain scale: 0 (none) — 10 (worst imaginable).
          Reps exercises: sets × reps @ weight. Time exercises: duration + intensity.
          Notes in italics.
        </footer>
      </article>
    </main>
  </template>

  <!-- Exercise Row Template -->
<!-- Single Set Template (Reps) -->
  <template id="tpl-set-row">
    <div class="set-row" data-set-row>
      <span class="set-number" data-set-number>1</span>
      <input type="number" inputmode="numeric" data-set-reps placeholder="Reps" min="0" class="set-input">
      <span class="set-at">×</span>
      <input type="number" inputmode="decimal" data-set-weight placeholder="lbs" min="0" step="0.5" class="set-input">
      <button class="btn-remove-set" data-remove-set aria-label="Remove set">×</button>
    </div>
  </template>

  <!-- Single Set Template (Time) -->
  <template id="tpl-set-row-time">
    <div class="set-row" data-set-row>
      <span class="set-number" data-set-number>1</span>
      <input type="text" inputmode="numeric" data-set-duration placeholder="min:sec" class="set-input">
      <span class="set-at">@</span>
      <input type="text" data-set-intensity placeholder="Intensity" class="set-input">
      <button class="btn-remove-set" data-remove-set aria-label="Remove set">×</button>
    </div>
  </template>

  <template id="tpl-exercise-row">
    <div class="exercise-row" data-exercise-row>
      <div class="exercise-row-header">
        <input type="text" class="exercise-name" data-exercise-name placeholder="Exercise name">
        <button class="btn-remove" data-remove-exercise aria-label="Remove">×</button>
      </div>
      <div class="exercise-type-toggle">
        <button class="type-btn active" data-type="reps" type="button">Reps</button>
        <button class="type-btn" data-type="time" type="button">Time</button>
      </div>

      <!-- Reps format: individual sets -->
      <div class="sets-container" data-sets-container data-grid-reps>
        <div class="sets-list" data-sets-list></div>
        <button class="btn-add-set" data-add-set type="button">+ Add Set</button>
      </div>

      <!-- Time format -->
      <div class="sets-container hidden" data-sets-container data-grid-time>
        <div class="sets-list" data-sets-list-time></div>
        <button class="btn-add-set" data-add-set-time type="button">+ Add Set</button>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
